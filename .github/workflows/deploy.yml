name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: Lottoland-maintenance-page/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: Lottoland-maintenance-page
        run: pnpm install

      - name: Build
        working-directory: Lottoland-maintenance-page
        run: pnpm exec vite build --base=/ll-maintenance-page/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Lottoland-maintenance-page/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
